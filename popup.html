<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #333;
      background: #fff;
    }
    .header {
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color: white;
      padding: 14px 16px;
    }
    .header h2 {
      font-size: 14px;
      font-weight: 600;
    }
    .header .version {
      font-size: 11px;
      opacity: 0.8;
      margin-top: 2px;
    }
    .stats {
      display: flex;
      padding: 12px 16px;
      gap: 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    .stat {
      flex: 1;
      text-align: center;
    }
    .stat-value {
      font-size: 20px;
      font-weight: 600;
      color: #1a73e8;
    }
    .stat-label {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }
    .actions {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .btn {
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #1a73e8;
      color: white;
    }
    .btn-primary:hover {
      background: #1557b0;
    }
    .footer {
      padding: 10px 16px;
      font-size: 11px;
      color: #bbb;
      text-align: center;
      border-top: 1px solid #f0f0f0;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>📋 专利费用查询助手</h2>
    <div class="version">v1.0.0</div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="totalCount">0</div>
      <div class="stat-label">总专利数</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="doneCount">0</div>
      <div class="stat-label">已处理</div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="btnOpenPanel">打开侧边栏</button>
  </div>

  <div class="footer">
    专利费用查询助手
  </div>

  <script src="popup.js"></script>
</body>
</html>
